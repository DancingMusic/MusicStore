<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MusicStoreSdk</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0d1b12; color: #ecfeff; }
      .wrap { max-width: 860px; margin: 0 auto; padding: 44px 20px; }
      h1 { margin: 0 0 8px; font-size: 34px; color: #86efac; }
      p { color: #9ca3af; line-height: 1.6; }
      .block { margin-top: 18px; padding: 14px 16px; border: 1px solid #14532d; border-radius: 12px; background: #052e16; }
      ul { margin: 8px 0 0; color: #d1fae5; }
      code { background: #14532d; border-radius: 6px; padding: 2px 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>MusicStoreSdk</h1>
      <p>职责：音乐商店领域 SDK。提供曲目/订单/授权模型、API 客户端、错误映射与发布包能力。</p>
      <div class="block">
        <strong>Core Exports</strong>
        <ul>
          <li><code>MusicStoreClient</code></li>
          <li><code>MusicTrack</code> / <code>MusicOrder</code> / Query Types</li>
        </ul>
      </div>
      <div class="block">
        <strong>Out of Scope</strong>
        <ul>
          <li>宿主 UI、插件加载器、舞蹈商店逻辑</li>
        </ul>
      </div>
    </div>
  </body>
</html>
