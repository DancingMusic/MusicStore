name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, test, validate registry, and build
        run: npm run check

      - name: Verify generated registry artifact exists
        run: test -f dist/registry/index.json

      - name: Verify every published connector artifact against SRI
        run: npm run verify:artifacts
